<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC Inspection Tool</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 20px;
        }

        h1, h2 { text-align: center; color: var(--primary); }

        .container { max-width: 1200px; margin: 0 auto; }

        /* Search Bar */
        .search-container {
            text-align: center;
            margin-bottom: 20px;
        }
        #searchInput {
            padding: 12px;
            width: 80%;
            max-width: 400px;
            border-radius: 20px;
            border: 2px solid var(--accent);
            font-size: 16px;
        }

        /* Material Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-left: 5px solid var(--accent);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }
        .card h3 { margin-top: 0; color: var(--primary); }
        .card p { font-size: 14px; color: #555; margin: 5px 0; }
        .checklist-small { font-size: 12px; color: #777; margin-top: 10px; display: none; }

        /* Calculator */
        .calculator {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .calc-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="number"], select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        
        button {
            padding: 12px 20px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
            display: none;
        }
        .pass { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .fail { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h1>Quality Control System</h1>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search material..." onkeyup="filterMaterials()">
    </div>

    <div class="grid" id="materialGrid"></div>

    <div class="calculator">
        <h2>Inspection Calculator</h2>
        <div class="calc-group">
            <label>Select Material</label>
            <select id="calcMaterialSelect" onchange="updateCalcFields()">
                <option value="">-- Choose a Material --</option>
            </select>
        </div>
        <div class="calc-group">
            <label>Total Received Quantity</label>
            <input type="number" id="receivedQty" placeholder="Enter total quantity">
        </div>
        <button onclick="calculateInspection()">Calculate Sample & Result</button>
        
        <div id="resultBox" class="result-box"></div>
    </div>
</div>

<script>
    // Database (Same as before, with added data)
    const materialsDatabase = {
        "mc4": { name: "MC4 Connectors (M/F)", sampling: "125/800", maxDefects: 14, checks: "Rust, Bend, Damage, Lock, End Cap, Scratch, Discolouration" },
        "inverter": { name: "Inverter", sampling: "20/100", maxDefects: null, checks: "Packing, Connector, Lock, Bracket, Earthing, Fan, Display" },
        "dcdb": { name: "ACDB/DCDB Box", sampling: "10/100", maxDefects: 1, checks: "Scratch, Labeling, Cable Connections, Insulation" },
        "optimizer": { name: "Optimizer", sampling: "32/100", maxDefects: null, checks: "Packing, Label, MC4 Connector, Cable, Bracket, Heat Sink" },
        "lug": { name: "Cable Lug", sampling: "50/1000", maxDefects: 2, checks: "Dimensions, Surface, Material, Corrosion, Plating" },
        "rod": { name: "Earthing Rods", sampling: "20/60", maxDefects: 2, checks: "Damage, Corrosion, Bend, Coating" },
        "chamber": { name: "Earthing Chambers", sampling: "5/50", maxDefects: 2, checks: "Grade, Thickness, Dimension, Damage" },
        "powder": { name: "Bentonite Powder", sampling: "20/60", maxDefects: 2, checks: "Packing, Weight, Label" },
        "conduit": { name: "PVC Conduits/Acc", sampling: "80/800", maxDefects: 10, checks: "Damage, Scratch, Discoloration, Bend, Thickness" },
        "cable": { name: "DC Cable 4 SQMM", sampling: "8/30", maxDefects: 1, checks: "Packing, Label, Damage, Insulation, Testing" },
        "tie": { name: "Cable Ties (Nylon/SS)", sampling: "80/1000", maxDefects: 7, checks: "Size, Damage, Dimension, Lock, Thickness" },
        "meter": { name: "Meter Box", sampling: "10/100", maxDefects: 1, checks: "Thickness, Coating, Welding, IP Rating" }
    };

    function init() {
        const grid = document.getElementById('materialGrid');
        const select = document.getElementById('calcMaterialSelect');
        
        for (let key in materialsDatabase) {
            let mat = materialsDatabase[key];
            // Create Card
            grid.innerHTML += `
                <div class="card" data-name="${mat.name.toLowerCase()}">
                    <h3>${mat.name}</h3>
                    <p><strong>Sampling:</strong> ${mat.sampling}</p>
                    <p><strong>Max Defects:</strong> ${mat.maxDefects || 'TBD'}</p>
                </div>
            `;
            // Add to Selector
            select.innerHTML += `<option value="${key}">${mat.name}</option>`;
        }
    }

    // Search Bar Function
    function filterMaterials() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.style.display = card.getAttribute('data-name').includes(query) ? "block" : "none";
        });
    }

    // Calculator Function
    function calculateInspection() {
        const key = document.getElementById('calcMaterialSelect').value;
        const received = parseInt(document.getElementById('receivedQty').value);
        const resultBox = document.getElementById('resultBox');
        
        if (!key || isNaN(received)) {
            alert("Please select a material and enter received quantity.");
            return;
        }

        const mat = materialsDatabase[key];
        const ratio = mat.sampling.split('/');
        const sampleSize = Math.ceil(received * (parseInt(ratio[0]) / parseInt(ratio[1])));
        
        resultBox.style.display = "block";
        resultBox.className = "result-box pass"; // Default style
        resultBox.innerHTML = `
            <strong>Material:</strong> ${mat.name}<br>
            <strong>Total Received:</strong> ${received}<br>
            <strong>Sample Size to Test:</strong> ${sampleSize}<br>
            <strong>Max Defects Allowed:</strong> ${mat.maxDefects || 'TBD'}
        `;
    }

    init();
</script>

</body>
</html>
