<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehensive QC Inspection Tool</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 20px;
        }

        h1, h2 { text-align: center; color: var(--primary); }

        .container { max-width: 1000px; margin: 0 auto; }

        /* Calculator/Selector Box */
        .panel {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .calc-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--primary); }
        input[type="number"], select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 16px; }

        button {
            padding: 12px 20px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
        }

        /* Data Display Area */
        .display-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: none; /* Hidden by default */
            border-left: 5px solid var(--accent);
        }

        .display-card h3 { margin-top: 0; color: var(--accent); border-bottom: 2px solid var(--light); padding-bottom: 10px; }
        
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        .info-item { background: var(--light); padding: 10px; border-radius: 5px; }
        .info-item strong { display: block; color: var(--primary); }

        .checklist-display {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #eee;
            font-size: 14px;
            white-space: pre-wrap; /* Preserves formatting */
            color: #333;
            line-height: 1.6;
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
            display: none;
            text-align: center;
        }
        .pass { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .fail { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h1>Quality Control System</h1>

    <div class="panel">
        <div class="calc-group">
            <label>Select Material for Inspection</label>
            <select id="materialSelect" onchange="displayMaterialData()">
                <option value="">-- Choose a Material --</option>
            </select>
        </div>
        <div class="calc-group">
            <label>Total Received Quantity</label>
            <input type="number" id="receivedQty" placeholder="Enter total quantity received">
        </div>
        <button onclick="calculateInspection()">Calculate Sample & View Checklist</button>
    </div>

    <div id="displayCard" class="display-card">
        <h3 id="displayName"></h3>
        
        <div class="info-grid">
            <div class="info-item"><strong>Sampling Ratio</strong><span id="displaySampling"></span></div>
            <div class="info-item"><strong>Acceptance Criteria</strong><span id="displayCriteria"></span></div>
        </div>

        <div style="margin-top:15px;"><strong>Full Inspection Checklist & Specifications:</strong>
            <div id="displayChecks" class="checklist-display"></div>
        </div>
        
        <div id="resultBox" class="result-box"></div>
    </div>
</div>

<script>
    // Database with SPECIFIC detailed shared data
    const materialsDatabase = {
        "mc4": {
            name: "MC4 Connectors (M/F)",
            sampling: "125/800",
            maxDefects: 14,
            checks: "1) Rust on connector surface\n2) Bent pins or contacts\n3) Physical damage to plastic housing\n4) Functional check of self-locking mechanism\n5) Tightness of end cap sleeve\n6) Scratches or dents on connector\n7) Discolouration of plastic or metal parts"
        },
        "inverter": {
            name: "Inverter",
            sampling: "20/100",
            maxDefects: null,
            checks: "1) Check box packing for damage\n2) Verify batch no. marking\n3) Verify quantity\n4) Inspect for missing parts or damage\n5) Check all connectors (AC/DC) for damage\n6) Check locking arrangement\n7) Inspect mounting bracket for damage/corrosion\n8) Verify physical dimensions\n9) Check earthing point connection\n10) Inspect cooling fans and ventilation\n11) Verify display functionality\n12) Check for loose components internally\n13) Verify IP protection rating\n14) Check packaging weight\n15) Verify manual and documentation availability"
        },
        "dcdb": {
            name: "ACDB/DCDB Box",
            sampling: "10/100",
            maxDefects: 1,
            checks: "1) Documentation: Review as-built drawings\n2) Exterior Condition: Check for scratches, physical cracks, and physical dents\n3) Accessibility and Clearance: Components inside box must be easily accessible\n4) Labeling and Identification: Components must be properly labeled with ratings\n5) Cable Connections & Terminations: Inspect for damage, fraying, or loose connections\n6) MCB and SPD: Check condition of MCB or SPD within the box\n7) Wiring and Insulation: Inspect internal wiring for loose connections or exposed wires\n8) Environmental Factors: Ensure box is appropriately sealed"
        },
        "optimizer": {
            name: "Optimizer",
            sampling: "32/100",
            maxDefects: null,
            checks: "1) Optimizer Box Packing: Verify box packing, batch no. marking, and quantity\n2) OEM Tag / Label: Verify OEM Tag is clearly visible and not removing\n3) MC4 Connector: Check cross mating, pin crimping, sleeve cover tightness, damage, and IP67 protection\n4) Cable: Verify no joint in wiring, insulation color (Red/Black), TUV Spec, and damage\n5) Optimizer Mounting bracket: Verify bend, corrosion, hole size (29.8*8.2mm), thickness (2.0mm), and dimensions\n6) Heat Sink: Check fin bend, width, height, and number of fins\n7) Hardware: Verify fastener Screw/bolt availability, size (5/16 inch, 1/4 inch), and SST star washer\n8) Certificate: Check Test Certificate and warranty card\n9) Symbol information: Verify Electronic waste, Hot Caution sign, and Double insulation"
        },
        "lug": {
            name: "Cable Lug",
            sampling: "50/1000",
            maxDefects: 2,
            checks: "1) Dimensional Accuracy: Match length, width, and thickness to specs\n2) Material Inspection: Check for surface cracks, fractures, or deformations\n3) Material Used: Verify material (copper, aluminum) meets BOM specs\n4) Corrosion: Inspect for signs of corrosion\n5) Smooth Surface: Free from rough edges or burrs\n6) Uniformity of Plating: Ensure uniform plating (tin or zinc) free from spots\n7) Correct Markings: Verify logo, part number, and batch number stamps\n8) Cleanliness: Surface must be clean and free from dirt/grease\n9) Packaging Integrity: Packaging must be intact"
        },
        "rod": {
            name: "Earthing Rods (Copper Bonded)",
            sampling: "20/60",
            maxDefects: 2,
            checks: "1) Physical Damage: Check for dents, scratches, or cuts on the copper coating.\n2) Corrosion: Inspect for signs of oxidation or corrosion.\n3) Loose connections/threads: Verify threads are clean and not damaged.\n4) Rod Straightness: Rod must be straight, with a tolerance of < 2mm per meter.\n5) Length & Diameter: Verify length and diameter (e.g., 14.2mm or 17.2mm) with a micrometer, check tolerance.\n6) Coating Thickness: Copper bonding thickness must be min 250 microns."
        },
        "chamber": {
            name: "Earthing Chambers (Concrete/PVC)",
            sampling: "5/50",
            maxDefects: 2,
            checks: "1) Material Grade: Check for cracks (concrete) or deformation (PVC).\n2) Dimensions: Verify diameter, height, and wall thickness.\n3) Weight: Check if weight matches specifications.\n4) Damage: Inspect for cuts, breaks, or manufacturing defects.\n5) Cover: Verify lid fits properly and can handle load."
        },
        "powder": {
            name: "Bentonite Powder (Backfill)",
            sampling: "20/60",
            maxDefects: 2,
            checks: "1) Packing Integrity: Check for moisture or tears in bags.\n2) Weight: Verify net weight per bag.\n3) Labeling: Check for manufacturer details, batch number, and expiry date.\n4) Physical Inspection: Powder should be fine, free from lumps."
        },
        "conduit": {
            name: "PVC Conduits & Accessories",
            sampling: "80/800",
            maxDefects: 10,
            checks: "1) Conduit Type: Check for Pipe, Bend, Elbow, Tee, Socket.\n2) Physical Damage: Check for cracks, dents, or brittle material.\n3) Dimensions: Verify outside diameter, inside diameter, and wall thickness (Tolerance: ±0.2mm).\n4) Length: Check pipe length (Tolerance: ±10mm).\n5) Finish: Interior must be smooth to prevent cable damage.\n6) Material: PVC must be fire retardant (FRLS) and UV resistant.\n7) Accessories: Ensure bends and elbows have smooth internal radii and proper fitment."
        },
        "cable": {
            name: "DC Cable 4 SQMM (Solar)",
            sampling: "8/30",
            maxDefects: 1,
            checks: "1) Sheath Damage: Check for cuts, punctures, or water ingress.\n2) Marking: Verify TUV certification, cable size, and voltage rating (1500V DC) are printed.\n3) Conductor: Copper must be tinned, check for uniform strand diameter.\n4) Insulation Thickness: Must meet specs (Tolerance: ±0.1mm).\n5) Insulation Testing: Perform continuity and insulation resistance test (Megger test).\n6) Flexibility: Cable should be flexible, check for brittleness."
        },
        "tie": {
            name: "Cable Ties (Nylon/SS)",
            sampling: "80/1000",
            maxDefects: 7,
            checks: "1) Type: Specify Nylon (UV resistant) or Stainless Steel (Ball Lock).\n2) Length & Width: Verify dimensions (Tolerance: ±2mm).\n3) Physical Condition: Check for cracks or manufacturing defects.\n4) Locking Mechanism: Test locking functionality (must not slip back).\n5) Discolouration: Nylon should be black for UV resistance, not grey/white."
        },
        "meter": {
            name: "Meter Box",
            sampling: "10/100",
            maxDefects: 1,
            checks: "1) Material: Verify MS, FRP, or Polycarbonate as per specs.\n2) Thickness: Check wall thickness (Tolerance: ±0.5mm).\n3) Coating: MS boxes must have uniform powder coating (Check for scratches/rust).\n4) Welding: Check joints for uniformity and strength.\n5) Door Alignment: Door should open/close smoothly without jamming.\n6) IP Rating: Check gasket condition for IP65/IP54 sealing.\n7) Locking: Check padlock/key lock functionality."
        }
    };

    // Populate Selector
    function populateSelector() {
        const select = document.getElementById('materialSelect');
        for (let key in materialsDatabase) {
            let option = document.createElement('option');
            option.value = key;
            option.text = materialsDatabase[key].name;
            select.add(option);
        }
    }

    // Display Data based on Selection
    function displayMaterialData() {
        const key = document.getElementById('materialSelect').value;
        const card = document.getElementById('displayCard');
        
        if (!key) {
            card.style.display = "none";
            return;
        }

        const mat = materialsDatabase[key];
        card.style.display = "block";
        document.getElementById('displayName').innerText = mat.name;
        document.getElementById('displaySampling').innerText = mat.sampling || "TBD";
        document.getElementById('displayCriteria').innerText = mat.maxDefects !== null ? `≤ ${mat.maxDefects} defects` : "TBD";
        document.getElementById('displayChecks').innerText = mat.checks;
        document.getElementById('resultBox').style.display = "none"; // Hide previous result
    }

    // Calculator Logic
    function calculateInspection() {
        const key = document.getElementById('materialSelect').value;
        const received = parseInt(document.getElementById('receivedQty').value);
        const resultBox = document.getElementById('resultBox');
        
        if (!key || isNaN(received)) {
            alert("Please select a material and enter received quantity.");
            return;
        }

        const mat = materialsDatabase[key];
        resultBox.style.display = "block";
        
        if (!mat.sampling) {
            resultBox.className = "result-box fail";
            resultBox.innerHTML = `Sampling ratio not defined for ${mat.name}.`;
            return;
        }
        
        const ratio = mat.sampling.split('/');
        const sampleSize = Math.ceil(received * (parseInt(ratio[0]) / parseInt(ratio[1])));
        
        resultBox.className = "result-box pass";
        resultBox.innerHTML = `
            <strong>Material:</strong> ${mat.name}<br>
            <strong>Total Received:</strong> ${received}<br>
            <strong>Sample Size to Test:</strong> ${sampleSize}<br>
            <strong>Max Defects Allowed:</strong> ${mat.maxDefects !== null ? mat.maxDefects : 'TBD'}
        `;
    }

    populateSelector();
</script>

</body>
</html>
