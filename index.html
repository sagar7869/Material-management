<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehensive QC Inspection Tool</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 20px;
        }

        h1, h2 { text-align: center; color: var(--primary); }

        .container { max-width: 1200px; margin: 0 auto; }

        /* Material Selector */
        .selector-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            text-align: center;
        }

        select {
            padding: 10px;
            font-size: 16px;
            width: 100%;
            max-width: 400px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        /* Material Display Card */
        .display-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: none; /* Hidden by default */
            margin-bottom: 20px;
            border-left: 5px solid var(--accent);
        }

        .display-card h3 { margin-top: 0; color: var(--accent); }
        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        .data-item { background: var(--light); padding: 10px; border-radius: 5px; }
        .data-item strong { display: block; color: var(--primary); }
        
        .checklist-display {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            border: 1px solid #eee;
            font-size: 14px;
            white-space: pre-wrap; /* Preserves formatting */
        }

        /* Calculator */
        .calculator {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .calc-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }

        button {
            padding: 12px 20px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
            display: none;
        }
        .pass { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .fail { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h1>Quality Control System</h1>

    <div class="selector-container">
        <label for="materialSelect"><strong>Select Material to Inspect:</strong></label><br><br>
        <select id="materialSelect" onchange="displayMaterialData()">
            <option value="">-- Choose a Material --</option>
        </select>
    </div>

    <div id="displayCard" class="display-card">
        <h3 id="displayName"></h3>
        <div class="data-grid">
            <div class="data-item"><strong>Sampling Ratio</strong><span id="displaySampling"></span></div>
            <div class="data-item"><strong>Accept Criteria</strong><span id="displayCriteria"></span></div>
        </div>
        <div class="data-item" style="margin-top:15px;"><strong>Full Inspection Checklist & Specifications</strong>
            <div id="displayChecks" class="checklist-display"></div>
        </div>
    </div>

    <div class="calculator">
        <h2>Inspection Calculator</h2>
        <div class="calc-group">
            <label>Total Received Quantity</label>
            <input type="number" id="receivedQty" placeholder="Enter total quantity">
        </div>
        <div class="calc-group">
            <label>Total Defects Found</label>
            <input type="number" id="defectsFound" placeholder="Enter defects">
        </div>
        <button onclick="calculateInspection()">Calculate Result</button>
        
        <div id="resultBox" class="result-box"></div>
    </div>
</div>

<script>
    // Database containing ALL shared data - NO SHORTENED FORMS
    const materialsDatabase = {
        "mc4": {
            name: "MC4 Connectors (M/F)",
            sampling: "125/800",
            maxDefects: 14,
            checks: "1) Rust on connector surface\n2) Bent pins or contacts\n3) Physical damage to plastic housing\n4) Functional check of self-locking mechanism\n5) Tightness of end cap sleeve\n6) Scratches or dents on connector\n7) Discolouration of plastic or metal parts"
        },
        "inverter": {
            name: "Inverter",
            sampling: "20/100",
            maxDefects: null,
            checks: "1) Check box packing for damage\n2) Verify batch no. marking\n3) Verify quantity\n4) Inspect for missing parts or damage\n5) Check all connectors (AC/DC) for damage\n6) Check locking arrangement\n7) Inspect mounting bracket for damage/corrosion\n8) Verify physical dimensions\n9) Check earthing point connection\n10) Inspect cooling fans and ventilation\n11) Verify display functionality\n12) Check for loose components internally\n13) Verify IP protection rating\n14) Check packaging weight\n15) Verify manual and documentation availability"
        },
        "dcdb": {
            name: "ACDB/DCDB Box",
            sampling: null,
            maxDefects: null,
            checks: "1) Documentation: Review as-built drawings\n2) Exterior Condition: Check for scratches, physical cracks, and physical dents\n3) Accessibility and Clearance: Components inside box must be easily accessible\n4) Labeling and Identification: Components must be properly labeled with ratings\n5) Cable Connections & Terminations: Inspect for damage, fraying, or loose connections\n6) MCB and SPD: Check condition of MCB or SPD within the box\n7) Wiring and Insulation: Inspect internal wiring for loose connections or exposed wires\n8) Environmental Factors: Ensure box is appropriately sealed"
        },
        "optimizer": {
            name: "Optimizer",
            sampling: "32/100",
            maxDefects: null,
            checks: "1) Optimizer Box Packing: Verify box packing, batch no. marking, and quantity\n2) OEM Tag / Label: Verify OEM Tag is clearly visible and not removing\n3) MC4 Connector: Check cross mating, pin crimping, sleeve cover tightness, damage, and IP67 protection\n4) Cable: Verify no joint in wiring, insulation color (Red/Black), TUV Spec, and damage\n5) Optimizer Mounting bracket: Verify bend, corrosion, hole size (29.8*8.2mm), thickness (2.0mm), and dimensions\n6) Heat Sink: Check fin bend, width, height, and number of fins\n7) Hardware: Verify fastener Screw/bolt availability, size (5/16 inch, 1/4 inch), and SST star washer\n8) Certificate: Check Test Certificate and warranty card\n9) Symbol information: Verify Electronic waste, Hot Caution sign, and Double insulation"
        },
        "lug": {
            name: "Cable Lug",
            sampling: null,
            maxDefects: null,
            checks: "1) Dimensional Accuracy: Match length, width, and thickness to specs\n2) Material Inspection: Check for surface cracks, fractures, or deformations\n3) Material Used: Verify material (copper, aluminum) meets BOM specs\n4) Corrosion: Inspect for signs of corrosion\n5) Smooth Surface: Free from rough edges or burrs\n6) Uniformity of Plating: Ensure uniform plating (tin or zinc) free from spots\n7) Correct Markings: Verify logo, part number, and batch number stamps\n8) Cleanliness: Surface must be clean and free from dirt/grease\n9) Packaging Integrity: Packaging must be intact"
        },
        "rod": {
            name: "Earthing Rods",
            sampling: "20/60",
            maxDefects: 2,
            checks: "1) Any Physical damage (Dent, Scratch, cut)\n2) Corrosion\n3) Loose connections\n4) Nut bolt Corrosion\n5) Earthing rod bend\n6) Length of rod\ 7) Diameter of rod\n8) Coating thickness"
        },
        "chamber": {
            name: "Earthing Chambers",
            sampling: "5/50",
            maxDefects: 2,
            checks: "1) Material Grade\n2) Thickness\n3) Discoloration\n4) Dimension\n5) Height\n6) Weight\n7) Damage\n8) Cut\n9) Scratch"
        },
        "powder": {
            name: "Bentonite Powder",
            sampling: "20/60",
            maxDefects: 2,
            checks: "1) Packing\n2) Weight\n3) Expiry date\n4) Cut\n5) Damage\n6) Label"
        },
        "conduit": {
            name: "PVC Conduits/Acc",
            sampling: "80/800",
            maxDefects: 10,
            checks: "1) Any Physical damage\n2) Any Scratch\n3) Discoloration\n4) Any Bend\n5) Diameter\n6) Thickness\n7) Length\n8) Material grade\n9) Colour\n10) Standard followed"
        },
        "cable": {
            name: "DC Cable 4 SQMM",
            sampling: "8/30",
            maxDefects: 1,
            checks: "1) Packaging Damage: Crushing, Punctures, Water damage\n2) Labeling Errors: Check type, category, and specifications\n3) Physical Damage: Cuts, frayed wire\n4) Insulation Defect: Cracks or punctures in insulation\n5) Manufacturing Defect: Inconsistent diameter, improper stranding, non-uniform insulation\n6) Certification: All appropriate certifications\n7) Testing: Insulation Resistance Test, Continuity Test, Conductor Resistance Test, High-Voltage Test"
        },
        "tie": {
            name: "Cable Ties (Nylon/SS)",
            sampling: "80/1000",
            maxDefects: 7,
            checks: "1) Size verification\n2) Damage check\n3) Discoloration check\n4) Dimension check\n5) Grip lock functionality\n6) Thickness check"
        },
        "meter": {
            name: "Meter Box",
            sampling: null,
            maxDefects: null,
            checks: "1) Documentation & Identification: Verify PO details, Serial number, IS/IEC compliance\n2) Material & Construction: Confirm material (MS/FRP/Polycarbonate), wall thickness, coating, welding uniformity\n3) Dimensions & Design: Box size, Door alignment, Locking arrangement, Cable entry glands\n4) Surface & Finish: No dents/scratches/rust, coating thickness, no sharp edges\n5) Electrical Fitments: Meter plate, Terminal blocks, Earthing point marking, insulation\n6) Weather Protection: IP rating (IP54/IP65), Rubber gasket, Hinges corrosion-resistant\n7) Quantity Verification: Total number and random sampling"
        }
    };

    // Populate Selector
    function populateSelector() {
        const select = document.getElementById('materialSelect');
        for (let key in materialsDatabase) {
            let option = document.createElement('option');
            option.value = key;
            option.text = materialsDatabase[key].name;
            select.add(option);
        }
    }

    // Display Data based on Selection
    function displayMaterialData() {
        const key = document.getElementById('materialSelect').value;
        const card = document.getElementById('displayCard');
        
        if (!key) {
            card.style.display = "none";
            return;
        }

        const mat = materialsDatabase[key];
        card.style.display = "block";
        document.getElementById('displayName').innerText = mat.name;
        document.getElementById('displaySampling').innerText = mat.sampling || "TBD";
        document.getElementById('displayCriteria').innerText = mat.maxDefects !== null ? `≤ ${mat.maxDefects} defects` : "TBD";
        document.getElementById('displayChecks').innerText = mat.checks;
    }

    // Calculator Logic
    function calculateInspection() {
        const key = document.getElementById('materialSelect').value;
        const received = parseInt(document.getElementById('receivedQty').value);
        const defects = parseInt(document.getElementById('defectsFound').value);
        const resultBox = document.getElementById('resultBox');
        
        if (!key || isNaN(received) || isNaN(defects)) {
            alert("Please select a material, enter quantity, and enter defects.");
            return;
        }

        const mat = materialsDatabase[key];
        resultBox.style.display = "block";

        if (!mat.sampling || mat.maxDefects === null) {
            resultBox.className = "result-box fail";
            resultBox.innerHTML = `Error: Cannot calculate. Sampling ratio or Accept/Reject criteria is missing for ${mat.name}.`;
            return;
        }
        
        const ratio = mat.sampling.split('/');
        const sampleSize = Math.ceil(received * (parseInt(ratio[0]) / parseInt(ratio[1])));
        
        if (defects <= mat.maxDefects) {
            resultBox.className = "result-box pass";
            resultBox.innerHTML = `PASSED: Need to test ${sampleSize} items. Found ${defects} defects (Limit: ${mat.maxDefects}).`;
        } else {
            resultBox.className = "result-box fail";
            resultBox.innerHTML = `REJECTED: Need to test ${sampleSize} items. Found ${defects} defects (Limit: ${mat.maxDefects}).`;
        }
    }

    populateSelector();
</script>

</body>
</html>
